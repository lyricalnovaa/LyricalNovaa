<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shop — Lyrical Novaa</title>
  <style>
    :root {
      --bg: #000; 
      --neon: #06f; /* Lyrical Novaa Blue */
      --neon-2: #0a7fff;
      --card-bg: rgba(6, 111, 255, 0.05);
      --glow: 0 0 20px rgba(6, 111, 255, 0.4);
    }
    
    body {
      margin: 0;
      background: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow-x: hidden;
      /* Subtle radial gradient for depth without the "grain" */
      background-image: radial-gradient(circle at 50% -20%, #001a33 0%, #000 70%);
      background-attachment: fixed;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(6, 111, 255, 0.2);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    a {
      color: var(--neon);
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    a:hover {
      color: var(--neon-2);
      filter: drop-shadow(0 0 5px var(--neon-2));
    }

    .container {
      max-width: 1200px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .shop-column {
      background: var(--card-bg);
      border: 1px solid rgba(6, 111, 255, 0.15);
      border-radius: 16px;
      padding: 24px;
      height: 72vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--neon) transparent;
      transition: border 0.3s ease;
    }

    .shop-column:hover {
      border-color: rgba(6, 111, 255, 0.5);
    }

    .shop-column::-webkit-scrollbar { width: 5px; }
    .shop-column::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

    .column-title {
      color: var(--neon);
      margin-top: 0;
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 2px solid var(--neon);
      padding-bottom: 12px;
      position: sticky;
      top: 0;
      background: #000;
      z-index: 2;
    }

    .item-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      animation: fadeIn 0.6s ease-out forwards;
      display: flex;
      flex-direction: column;
      align-items: center; 
      text-align: center;
    }

    .item-card:hover {
      background: rgba(6, 111, 255, 0.08);
      border-color: var(--neon);
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }

    .album-art {
      width: 100%;
      height: 220px;
      background-image: url('/static/DigitalDemonCover.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      margin-bottom: 15px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 12px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }

    .play-btn {
      background: var(--neon);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.1);
      background: var(--neon-2);
    }

    .play-btn.playing {
      animation: pulse 1.5s infinite;
      background: #fff;
      color: var(--neon);
    }

    .stripe-btn {
      display: inline-block;
      /* Reduced width - adjusts to the text size with some padding */
      width: auto; 
      min-width: 140px; 
      max-width: 200px;
      
      text-align: center;
      background: linear-gradient(90deg, var(--neon), var(--neon-2));
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      margin-top: 12px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      transition: 0.3s;
    }

    .stripe-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 15px var(--neon);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(6, 111, 255, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(6, 111, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(6, 111, 255, 0); }
    }

    @media (max-width: 900px) {
      .shop-grid { grid-template-columns: 1fr; }
      .shop-column { height: auto; margin-bottom: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="/">← Home</a>
      <div style="font-weight:800; color:#fff; letter-spacing: 1px;">Lyrical Novaa Store</div>
    </div>
    <nav>
      <a href="/team" style="margin-right:12px">Team</a>
      <a href="/contact-us">Contact</a>
    </nav>
  </header>

  <main class="container">
    <div class="shop-grid">
      <div class="shop-column">
        <h2 class="column-title">Beats</h2>
        <div class="item-card">
          <div class="album-art">
            <div class="audio-controls">
              <button class="play-btn" id="previewBtn">▶</button>
              <span style="font-size: 0.9rem; font-weight: bold;">Digital Demon (Preview)</span>
            </div>
          </div>
          <audio id="digitalDemonsAudio" src="/static/DigitalDemonSample.wav"></audio>
          <h3 style="margin: 5px 0 2px 0;">Digital Demons</h3>
          <p style="margin: 0; font-size: 0.9rem; color: #8fbfff;">Melodic Trap/Juice WRLD</p>
          <p style="font-size: 1.2rem; font-weight: bold; color: var(--neon-2); margin: 10px 0;">$15.00</p>
          <a href="https://buy.stripe.com/9B64gA9DQaeBdgv8JjaIM00" target="_blank" class="stripe-btn">Buy License</a>
        </div>
      </div>

      <div class="shop-column">
        <h2 class="column-title">Merch</h2>
        <div class="item-card">
          <div style="height: 180px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px dashed rgba(6, 111, 255, 0.3);">
            <span style="color: var(--neon-2);">Coming Soon</span>
          </div>
          <h3 style="margin: 5px 0 2px 0;">Hoodies</h3>
          <p style="font-size: 1.2rem; font-weight: bold; color: var(--neon-2); margin: 10px 0;">$0</p>
          <a href="#" class="stripe-btn" style="opacity: 0.6; pointer-events: none;">Coming Soon</a>
        </div>
      </div>

      <div class="shop-column">
        <h2 class="column-title">Presets</h2>
        <div class="item-card">
          <div style="height: 180px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px dashed rgba(6, 111, 255, 0.3);">
            <span style="color: var(--neon-2);">Vocal Presets</span>
          </div>
          <h3 style="margin: 5px 0 2px 0;">Coming Soon</h3>
          <p style="font-size: 1.2rem; font-weight: bold; color: var(--neon-2); margin: 10px 0;">$0</p>
          <a href="#" class="stripe-btn">Coming Soon</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/shop.js"></script>
</body>
</html>
