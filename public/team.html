<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Team — Lyrical Novaa</title>
  <style>
    :root{--bg:#000;--neon:#06f}
    body{margin:0;background:var(--bg);color:var(--neon);font-family:'Segoe UI',sans-serif}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px}
    a{color:var(--neon);text-decoration:none}
    .container{max-width:1100px;margin:36px auto;padding:0 20px}
    .member{display:flex;gap:12px;padding:12px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(6,111,255,0.06);margin-bottom:12px}
    img{width:64px;height:64px;border-radius:8px;object-fit:cover}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="/">← Home</a>
      <div style="font-weight:800">Team</div>
    </div>
    <nav>
      <a href="/shop" style="margin-right:12px">Shop</a>
      <a href="/contact-us">Contact</a>
    </nav>
  </header>
  <main class="container">
    <h2 style="color:var(--neon)">Label Members</h2>
    <div class="member">
      <img src="/static/XANTANX.png" alt="XANTANX" />
      <div>
        <div style="font-weight:800">XANTANX</div>
        <div style="color:#cfe9ff">@XANTANX • Artist</div>
      </div>
    </div>
    <div class="member">
      <img src="/static/Mercy.png" alt="Mercy" />
      <div>
        <div style="font-weight:800">Mercy</div>
        <div style="color:#cfe9ff">@MercyOfficial • Artist</div>
      </div>
    </div>
  </main>
</body>
</html>
